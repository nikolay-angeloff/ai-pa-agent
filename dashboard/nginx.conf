server {
    listen 4200;
    root /usr/share/nginx/html;
    index index.html;

    # Generated at container start by docker-entrypoint.sh from env.template.js —
    # never cache, otherwise a redeploy with new API_BASE_URL/WS_BASE_URL won't
    # take effect until the browser's cache expires.
    location = /env.js {
        add_header Cache-Control "no-store";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
