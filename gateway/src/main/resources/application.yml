server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: facade
          uri: ${FACADE_URI:http://localhost:8081}
          predicates:
            - Path=/api/**
          filters:
            # Strip /api prefix before forwarding: /api/health → /health
            - StripPrefix=1

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
